name: Build IPA

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: get xcodegen
        run: brew install xcodegen

      - name: generate
        run: xcodegen generate

      - name: build
        run: |
          xcodebuild build \
            -project OpenCodeRemote.xcodeproj \
            -scheme OpenCodeRemote \
            -destination "generic/platform=iOS" \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tail -80

      - name: find app
        id: find
        run: |
          APP=$(find ~/Library/Developer/Xcode/DerivedData -name "OpenCodeRemote.app" -type d | head -1)
          echo "APP=$APP"
          echo "APP=$APP" >> $GITHUB_OUTPUT

      - name: pack ipa
        run: |
          mkdir -p /tmp/Payload
          cp -r "${{ steps.find.outputs.APP }}" /tmp/Payload/
          cd /tmp
          zip -qr OpenCodeRemote.ipa Payload
          ls -lh OpenCodeRemote.ipa

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: OpenCodeRemote.ipa
          path: /tmp/OpenCodeRemote.ipa
