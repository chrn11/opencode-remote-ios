name: Build IPA

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: generate project (npx)
        run: npx xcodegen generate

      - name: build
        run: |
          xcodebuild build \
            -project OpenCodeRemote.xcodeproj \
            -scheme OpenCodeRemote \
            -destination "generic/platform=iOS" \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tail -60

      - name: pack
        run: |
          APP=$(find ~/Library/Developer/Xcode/DerivedData -name "OpenCodeRemote.app" -type d | head -1)
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r OpenCodeRemote.ipa Payload
          ls -lh OpenCodeRemote.ipa

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: OpenCodeRemote.ipa
          path: OpenCodeRemote.ipa
