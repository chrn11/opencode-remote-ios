name: Build IPA

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # --------------------------------------------------
      # 1. 安装 xcodeproj gem（CI runner 自带 Ruby，无需 brew）
      # --------------------------------------------------
      - name: Setup Ruby & install xcodeproj
        run: |
          ruby --version
          gem install xcodeproj --no-document

      # --------------------------------------------------
      # 2. 运行 Ruby 脚本生成 .xcodeproj
      # --------------------------------------------------
      - name: Generate .xcodeproj
        run: |
          ruby scripts/generate_xcodeproj.rb
          ls -la OpenCodeRemote.xcodeproj/
          cat OpenCodeRemote.xcodeproj/project.pbxproj | head -50

      # --------------------------------------------------
      # 3. xcodebuild Archive（未签名，只验证编译）
      # --------------------------------------------------
      - name: Build & Archive (no signing)
        run: |
          xcodebuild archive \
            -project OpenCodeRemote.xcodeproj \
            -scheme OpenCodeRemote \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/OpenCodeRemote.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | xcbeautify

      # --------------------------------------------------
      # 4. 打包 .app → .ipa（未签名）
      # --------------------------------------------------
      - name: Package unsigned IPA
        run: |
          APP_BUNDLE="build/OpenCodeRemote.xcarchive/Products/Applications/OpenCodeRemote.app"
          mkdir -p Payload
          cp -R "$APP_BUNDLE" Payload/
          zip -r OpenCodeRemote.ipa Payload
          ls -lh OpenCodeRemote.ipa

      # --------------------------------------------------
      # 5. 上传构建产物
      # --------------------------------------------------
      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: OpenCodeRemote-ipa
          path: OpenCodeRemote.ipa
          if-no-files-found: ignore

      - name: Upload archive artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: OpenCodeRemote-xcarchive
          path: build/OpenCodeRemote.xcarchive
          if-no-files-found: ignore
