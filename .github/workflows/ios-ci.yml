name: Build IPA

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: °²×° xcodegen
        run: sudo npm install -g xcodegen

      - name: Éú³É Xcode ÏîÄ¿
        run: xcodegen generate

      - name: ±àÒë
        run: |
          xcodebuild build \
            -project OpenCodeRemote.xcodeproj \
            -scheme OpenCodeRemote \
            -destination "generic/platform=iOS" \
            -configuration Release \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tail -40
          FIND_APP=$(find ~/Library/Developer/Xcode/DerivedData -name "OpenCodeRemote.app" -type d | head -1)
          echo "APP=$FIND_APP"
          echo "APP=$FIND_APP" >> $GITHUB_ENV

      - name: ´ò°ü IPA
        run: |
          cd /tmp
          mkdir -p Payload
          cp -r "$APP" Payload/ 2>/dev/null
          zip -qr OpenCodeRemote.ipa Payload
          ls -lh OpenCodeRemote.ipa

      - name: ÉÏ´« IPA
        uses: actions/upload-artifact@v4
        with:
          name: OpenCodeRemote.ipa
          path: /tmp/OpenCodeRemote.ipa
