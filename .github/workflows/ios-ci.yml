name: Build IPA

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: Build IPA
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: compile
        run: |
          cd OpenCodeRemote
          SDK=$(xcrun --show-sdk-path --sdk iphoneos)
          swiftc \
            -target arm64-apple-ios17.0 \
            -sdk "$SDK" \
            -O \
            -parse-as-library \
            -emit-executable \
            -o /tmp/OpenCodeRemote \
            $(find . -name '*.swift' | sort) 2>&1 | tail -60

          file /tmp/OpenCodeRemote

      - name: pack
        run: |
          mkdir -p Payload/OpenCodeRemote.app
          cp /tmp/OpenCodeRemote Payload/OpenCodeRemote.app/
          cp OpenCodeRemote/Info.plist Payload/OpenCodeRemote.app/
          zip -r OpenCodeRemote.ipa Payload 2>&1
          ls -lh OpenCodeRemote.ipa

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: OpenCodeRemote.ipa
          path: OpenCodeRemote.ipa
