name: iOS CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: 安装 xcodegen (npm)
        run: npm install -g xcodegen

      - name: 生成项目
        run: xcodegen generate

      - name: 编译
        run: |
          xcodebuild build \
            -project OpenCodeRemote.xcodeproj \
            -scheme OpenCodeRemote \
            -destination "generic/platform=iOS" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            2>&1 | tail -100
