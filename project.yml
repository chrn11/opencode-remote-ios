name: OpenCodeRemote
options:
  bundleIdPrefix: com.opencode
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"

targets:
  OpenCodeRemote:
    type: application
    platform: iOS
    sources:
      - path: OpenCodeRemote
    settings:
      base:
        INFOPLIST_FILE: OpenCodeRemote/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.opencode.remote
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: "Automatic"
    dependencies: []
    preBuildScripts:
      - name: "SwiftLint"
        script: |
          if command -v swiftlint >/dev/null 2>&1; then
            swiftlint --config .swiftlint.yml
          else
            echo "SwiftLint not installed, skipping"
          fi
        basedOnDependencyAnalysis: false

  OpenCodeRemoteTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: OpenCodeRemoteTests
    dependencies:
      - target: OpenCodeRemote
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"

  OpenCodeRemoteUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: OpenCodeRemoteUITests
    dependencies:
      - target: OpenCodeRemote
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
